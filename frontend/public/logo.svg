<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 100">
  <!-- Icon Group -->
  <g transform="translate(10, 10) scale(0.8)">
    <!-- Book Pages -->
    <path d="M10,70 Q45,90 80,70 L80,85 Q45,105 10,85 Z" fill="#0047AB" />
    <path d="M80,70 Q115,90 150,70 L150,85 Q115,105 80,85 Z" fill="#0047AB" />
    <!-- Page Edges (White/Light Blue) -->
    <path d="M15,68 Q45,82 75,68" fill="none" stroke="#60A5FA" stroke-width="3" />
    <path d="M85,68 Q115,82 145,68" fill="none" stroke="#60A5FA" stroke-width="3" />

    <!-- Cap -->
    <path d="M20,40 L80,15 L140,40 L80,65 Z" fill="#0047AB" />
    <path d="M140,40 L140,55 L80,80 L20,55 L20,40" fill="#1E3A8A" opacity="0.4" />
    <!-- Tassel -->
    <circle cx="80" cy="15" r="3" fill="#2DD4BF" />
    
    <!-- Circuit Lines (Left) -->
    <circle cx="5" cy="50" r="4" fill="#2DD4BF" />
    <line x1="5" y1="50" x2="30" y2="50" stroke="#2DD4BF" stroke-width="3" />
    <circle cx="0" cy="65" r="4" fill="#2DD4BF" />
    <line x1="0" y1="65" x2="25" y2="60" stroke="#2DD4BF" stroke-width="3" />
    <circle cx="10" cy="35" r="4" fill="#2DD4BF" />
    <line x1="10" y1="35" x2="35" y2="42" stroke="#2DD4BF" stroke-width="3" />

    <!-- Arrow (Green Rising) -->
    <path d="M60,60 Q90,50 130,10 L120,10 L145,0 L145,25 L135,25" fill="#4ADE80" />
  </g>

  <!-- Text Group -->
  <g transform="translate(150, 15)">
    <text x="0" y="55" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="60" fill="#0047AB">AAES</text>
    <text x="2" y="78" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="11" fill="#1E293B" letter-spacing="0.5">AI-Powered Academic Evaluation System</text>
  </g>
</svg>
